<!DOCTYPE html>
<html lang="en">

<head>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;700&display=swap" rel="stylesheet" />
  <!-- Styles CSS -->
  <link href="css/styles.css" rel="stylesheet" />
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>
<header>
  <h1>Cove Spring Park</h1>
  <p>A Personal Photo Journey — April 2026</p>
</header>

<main class="gallery-container">
  <h2>Hurst Falls</h2>
  <div class="row g-4">
    <!-- Using Bootstrap Grid for clean alignment -->
    <div class="col-md-6">
      <div class="gallery-item">
        <img src="images/Hurst Falls in Cove Spring Park.jpg" alt="Waterfall">
        <div class="desc">The First Encounter</div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="gallery-item">
        <img src="images/Waterfall at Cove Spring Park (blurred).jpg" alt="Blurred water">
        <div class="desc">Motion in the Mist</div>
      </div>
    </div>
  </div>

  <h2 class="mt-5">Natural Details</h2>
  <div class="row g-4">
    <div class="col-md-4">
      <div class="gallery-item">
        <img src="images/Creek with rocks at Cove Spring Park.jpg" alt="Creek">
        <div class="desc">Textured Stones</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="gallery-item">
        <img src="images/Natural cascade at Cove Spring Park.jpg" alt="Cascade">
        <div class="desc">Hidden Layers</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="gallery-item">
        <img src="images/View of creek and trees at Cove Spring Park.jpg" alt="Creek and trees">
        <div class="desc">Ancient Canopies</div>
      </div>
    </div>
  </div>

  <h2 class="mt-5">The Location</h2>
  <div id="map"></div>
</main>
<!-- Add Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<!-- then Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([51.505, -0.09], 13);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);

  L.marker([51.5, -0.09]).addTo(map)
    .bindPopup('A pretty CSS popup.<br> Easily customizable.')
    .openPopup();
</script>
<footer>
  <p>&copy; 2026 | Built with GitHub Pages</p>
</footer>
